# ── HTTP ────────────────────────────────────────────────
quarkus.http.port=8000
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:8000
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-csrf-token
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.body.handle-file-uploads=true
quarkus.http.limits.max-body-size=200M
# Par défaut 2K — bien trop petit pour notre payload `metadata` JSON
# (100 photos × ~250 chars = ~25 KB). On bump.
quarkus.http.limits.max-form-attribute-size=10M
quarkus.http.body.uploads-directory=${java.io.tmpdir}/speciarium-uploads
quarkus.http.body.merge-form-attributes=true

# ── Database (réutilise le schéma Django existant) ──────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER:speciarium}
quarkus.datasource.password=${POSTGRES_PASSWORD:speciarium}
quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:speciarium}

# Mode validate : on n'altère pas le schéma géré par les migrations Django
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=fr.speciarium.common.DjangoCompatibleNamingStrategy

# ── Media (chemin partagé avec l'ancien stack) ──────────
# En dev (mvn quarkus:dev depuis backend/) on pointe sur src/media du repo.
# En prod, surcharger via la variable d'env MEDIA_ROOT.
speciarium.media.root=${MEDIA_ROOT:../src/media}
speciarium.media.url=/media/

# ── Sessions ────────────────────────────────────────────
speciarium.session.cookie-name=speciarium_session
speciarium.session.ttl-seconds=2592000

# ── Redis (progress WebSocket) ──────────────────────────
quarkus.redis.hosts=redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}

# ── Logging ─────────────────────────────────────────────
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.category."fr.speciarium".level=DEBUG
