name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  python-check:
    name: Python compile + Django check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile all Python sources
        run: python -m compileall -q src

      - name: Django system check
        working-directory: src
        env:
          SECRET_KEY: ci-test-secret-key
          DEBUG: 'False'
          DJANGO_ENV: development
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
          EMAIL_HOST_USER: ci@example.com
          EMAIL_HOST_PASSWORD: ci-password
        run: python manage.py check

  docker-smoke-test:
    name: Docker stack starts and serves traffic
    runs-on: ubuntu-latest
    needs: python-check
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from .env.example
        run: cp .env.example .env

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for Django to respond
        run: |
          for i in {1..45}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8003/accounts/login/ || echo 000)
            if [ "$code" = "200" ]; then
              echo "Django is up (HTTP $code)"
              exit 0
            fi
            echo "Attempt $i: HTTP $code, retrying..."
            sleep 2
          done
          echo "Django did not respond with 200 in time"
          docker compose ps
          docker compose logs
          exit 1

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
